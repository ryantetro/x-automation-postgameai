name: Refresh Threads Token

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-threads-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Refresh Threads token and update repo secret
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.THREADS_SECRET_ADMIN_TOKEN }}
        run: |
          if [ -z "${THREADS_ACCESS_TOKEN}" ]; then
            echo "Missing THREADS_ACCESS_TOKEN secret."
            exit 1
          fi
          if [ -z "${GH_TOKEN}" ]; then
            echo "Missing THREADS_SECRET_ADMIN_TOKEN secret."
            exit 1
          fi

          RAW_JSON=$(npm run threads:token:refresh --workspace @x-automation/social-bot-engine -- --json)
          NEW_TOKEN=$(node -e 'const data = JSON.parse(process.argv[1]); process.stdout.write(data.accessToken);' "$RAW_JSON")
          EXPIRES_AT=$(node -e 'const data = JSON.parse(process.argv[1]); process.stdout.write(data.expiresAt);' "$RAW_JSON")

          if [ -z "${NEW_TOKEN}" ]; then
            echo "Refresh returned an empty token."
            exit 1
          fi

          echo "::add-mask::${NEW_TOKEN}"
          gh secret set THREADS_ACCESS_TOKEN --repo "${GITHUB_REPOSITORY}" --body "${NEW_TOKEN}"
          echo "Threads token refreshed successfully. New expiry: ${EXPIRES_AT}"
