name: Refresh Campaign Threads Tokens

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-threads-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Refresh campaign Threads tokens and update repo secret
        env:
          BOT_CREDENTIALS_JSON: ${{ secrets.BOT_CREDENTIALS_JSON }}
          GH_TOKEN: ${{ secrets.THREADS_SECRET_ADMIN_TOKEN }}
        run: |
          if [ -z "${BOT_CREDENTIALS_JSON}" ]; then
            echo "Missing BOT_CREDENTIALS_JSON secret."
            exit 1
          fi
          if [ -z "${GH_TOKEN}" ]; then
            echo "Missing THREADS_SECRET_ADMIN_TOKEN secret."
            exit 1
          fi

          RAW_JSON=$(npm run threads:token:refresh:campaigns --workspace @x-automation/social-bot-engine -- --json)
          UPDATED_JSON=$(node -e 'const data = JSON.parse(process.argv[1]); process.stdout.write(data.updatedCredentialsJson);' "$RAW_JSON")
          REFRESHED=$(node -e 'const data = JSON.parse(process.argv[1]); process.stdout.write((data.refreshedCampaigns || []).map((row) => `${row.campaign}:${row.expiresAt}`).join(","));' "$RAW_JSON")

          if [ -z "${UPDATED_JSON}" ]; then
            echo "Refresh returned empty campaign credentials."
            exit 1
          fi

          if [ -z "${REFRESHED}" ]; then
            echo "No campaign Threads tokens found; skipping secret update."
            exit 0
          fi

          echo "::add-mask::${UPDATED_JSON}"
          gh secret set BOT_CREDENTIALS_JSON --repo "${GITHUB_REPOSITORY}" --body "${UPDATED_JSON}"
          echo "Campaign Threads tokens refreshed successfully: ${REFRESHED}"
