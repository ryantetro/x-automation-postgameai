# Post to X (and optionally Threads) for every campaign in campaigns/.
# Each campaign uses its own config (campaigns/<slug>/config.json) and credentials
# from the BOT_CREDENTIALS_JSON secret (keyed by slug).
# Add a new bot by adding campaigns/<slug>/config.json and an entry in BOT_CREDENTIALS_JSON.

name: Post to X (all campaigns)

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-campaigns-push
  cancel-in-progress: false

jobs:
  list-campaigns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - id: list
        run: echo "slugs=$(npx tsx apps/social-bot-engine/scripts/list-campaigns.ts)" >> $GITHUB_OUTPUT
    outputs:
      slugs: ${{ steps.list.outputs.slugs }}

  post:
    needs: list-campaigns
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        campaign: ${{ fromJson(needs.list-campaigns.outputs.slugs) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run bot (${{ matrix.campaign }})
        id: run_bot
        continue-on-error: true
        env:
          CAMPAIGN: ${{ matrix.campaign }}
          BOT_CREDENTIALS_JSON: ${{ secrets.BOT_CREDENTIALS_JSON }}
          POST_TARGETS: ${{ vars.POST_TARGETS || 'x' }}
          POST_ENABLED: true
          ANALYTICS_STORE_FILENAME: tweet-analytics.json
          ANALYTICS_ENABLED: ${{ vars.ANALYTICS_ENABLED || 'true' }}
          ANALYTICS_LOOKBACK_DAYS: ${{ vars.ANALYTICS_LOOKBACK_DAYS }}
          ANALYTICS_MIN_AGE_MINUTES: ${{ vars.ANALYTICS_MIN_AGE_MINUTES }}
          ANALYTICS_MAX_REFRESH: ${{ vars.ANALYTICS_MAX_REFRESH }}
          NEWS_ENABLED: ${{ vars.NEWS_ENABLED }}
          NEWS_LOOKBACK_HOURS: ${{ vars.NEWS_LOOKBACK_HOURS }}
          NEWS_MAX_ARTICLES: ${{ vars.NEWS_MAX_ARTICLES }}
          NEWS_LANGUAGE: ${{ vars.NEWS_LANGUAGE }}
          NEWS_SORT_BY: ${{ vars.NEWS_SORT_BY }}
          NEWS_ALLOWED_DOMAINS: ${{ vars.NEWS_ALLOWED_DOMAINS }}
          NEWS_ALLOWED_SOURCES: ${{ vars.NEWS_ALLOWED_SOURCES }}
          TRACKING_BASE_URL: ${{ vars.TRACKING_BASE_URL }}
          UTM_SOURCE: ${{ vars.UTM_SOURCE }}
          UTM_MEDIUM: ${{ vars.UTM_MEDIUM }}
          UTM_CAMPAIGN_PREFIX: ${{ vars.UTM_CAMPAIGN_PREFIX }}
        run: npm run bot:post:x

      - name: Persist state (${{ matrix.campaign }})
        if: always()
        run: |
          STATE_DIR="state/${{ matrix.campaign }}"
          STATE_FILE="${STATE_DIR}/tweet-analytics.json"
          if [ ! -f "$STATE_FILE" ]; then
            echo "No state file at $STATE_FILE; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$STATE_FILE"
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore(bot): update analytics state [${{ matrix.campaign }}] [skip ci]"
          git stash --include-untracked || true
          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to persist state after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 5))
          done
          git stash pop 2>/dev/null || true

      - name: Fail if bot run failed
        if: steps.run_bot.outcome == 'failure'
        run: exit 1